
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form di Login</title>

    <style>
    
        body {
            background-color: rgb(224, 196, 255);
            display: flex;
            justify-content: center;
            padding: 50px;
        }

        h1 {
            text-align: center;
            font-size: 40px;
        }
    
        .container {
            background-color: white;
            width: 600px;
            padding: 40px;
            border-radius: 30px;
            
        }
    
        .testo {
            font-family: 'Times New Roman', Times, serif;
            font-size: 20px;
            text-align: left;
            font-weight: bold;
        }

        .buttons {
            width: 98%;
            height: 70px;
            background-color: rgb(46, 46, 46);
            color:white;
            font-family: Arial, Helvetica, sans-serif;
            font-size: large;
            margin-top: 50px;
        }
        
        .inputs {
            width: 100%;
            height: 40px;
            border-radius: 10px;
            border: 2px solid black;
            font-size: 18px;
            margin-bottom: 50px;
        }

    </style>
</head>



<body>
    <form class="container">

        <h1>Form di Login</h1>

        <div class="testo">Nome:</div>
        <input type="text" class="inputs" id="usernameInput">

        <div class="testo">Email:</div>
        <input type="text" class="inputs" id="emailInput">

        <div class="testo">Numero di Telefono:</div>
        <input type="text" class="inputs" id="telefonoInput">

        <div class="testo">Budget Disponibile:</div>
        <input type="text" class="inputs" id="budgetInput">

        <div class="testo">Servizi Richiesti:</div>
        
        <input type="checkbox" id="HTML">
        <label for="HTML">HTML</label><br>
        
        <input type="checkbox" id="PHP">
        <label for="PHP">PHP</label><br>
        
        <input type="checkbox" id="ASP">
        <label for="ASP">ASP</label><br>

        <input type="checkbox" id="Java">
        <label for="Java">Java</label><br>
        
        <input type="checkbox" id="C++">
        <label for="C++">C++</label>

        <button class="buttons" type="button" id="Submit" onclick="checkForm()"> Submit </button>
        
        <div id="risultato"></div>
        
        <script src="./app.js"></script>
    </form>


</body>


</html>
