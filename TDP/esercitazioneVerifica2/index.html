
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form di Richiesta</title>

    <style>
    
        body {
            background-color: rgb(233, 213, 255);
            display: flex;
            justify-content: center;
            padding: 50px;
        }

        h1 {
            text-align: center;
            font-size: 40px;
        }
    
        .container {
            background-color: white;
            width: 700px;
            padding: 40px;
            border-radius: 30px;
            
        }
    
        .testo {
            font-family: 'Times New Roman', Times, serif;
            font-size: 20px;
            text-align: left;
            font-weight: bold;
        }

        .testoAcapo {
            font-family: 'Times New Roman', Times, serif;
            font-size: 20px;
            text-align: left;
            font-weight: bold;
            margin-top: 60px;
        }

        .buttons {
            width: 98%;
            height: 70px;
            background-color: rgb(46, 46, 46);
            color:white;
            font-family: Arial, Helvetica, sans-serif;
            font-size: large;
            margin-top: 50px;
        }
        
        .inputs {
            width: 100%;
            height: 40px;
            border-radius: 10px;
            border: 2px solid black;
            font-size: 18px;
            margin-bottom: 25px;
        }

        .error {
            font-family: 'Times New Roman', Times, serif;
            font-size: 20px;
            text-align: left;
            font-weight: bold;
            color: red;
        }


    </style>
</head>



<body>
    <form class="container">

        <h1>Quiz</h1>

        <div class="testo">--- Dati studente ---</div>
        <br>
        <div class="testo">Nome e Cognome:</div>
        <input type="text" class="inputs" id="nameInput">
        <div type="error"></div>
        <div class="testo">Classe:</div>
        <input type="text" class="inputs" id="classInput">
        <div class="error" id="datiError"></div>


        <div class="testoAcapo">--- Qual è la capitale della Francia? ---</div>
        <br>
        <input type="radio" id="Berlino" name="france_capital" value="Berlino">
        <label for="Berlino">Berlino</label><br>
        <input type="radio" id="Madrid" name="france_capital" value="Madrid">
        <label for="Madrid">Madrid</label><br>
        <input type="radio" id="Parigi" name="france_capital" value="Parigi">
        <label for="Parigi">Parigi</label><br>
        <input type="radio" id="Roma" name="france_capital" value="Roma">
        <label for="Roma">Roma</label><br>
        <br>
        <div class="error" id="capitalError"></div>



        <div class="testoAcapo">--- Quale pianeta è conosciuto come il Pianeta Rosso? ---</div>
        <br>
        <input type="radio" id="Marte" name="planet" value="Marte">
        <label for="Marte">Marte</label><br>
        <input type="radio" id="Venere" name="planet" value="Venere">
        <label for="Venere">Venere</label><br>
        <input type="radio" id="Giove" name="planet" value="Giove">
        <label for="Giove">Giove</label><br>
        <input type="radio" id="Saturno" name="planet" value="Saturno">
        <label for="Saturno">Saturno</label><br>
        <br>
        <div class="error" id="planetError"></div>


        <div class="testoAcapo">--- Quanto fa 5 x 6? ---</div>
        <br>
        <input type="radio" id="25" name="maths" value="25">
        <label for="25">25</label><br>
        <input type="radio" id="30" name="maths" value="30">
        <label for="30">30</label><br>
        <input type="radio" id="35" name="maths" value="35">
        <label for="35">35</label><br>
        <input type="radio" id="40" name="maths" value="40">
        <label for="40">40</label><br>
        <br>
        <div class="error" id="mathsError"></div>

        
        <button class="buttons" type="button" id="Submit" onclick="checkForm()"> Submit </button>
        
        <div id="risultato"></div>
        
        <script src="./app.js"></script>
    </form>


</body>


</html>
